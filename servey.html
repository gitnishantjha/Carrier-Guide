<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"  type="text/css"  href="CSS/servey.css">
    

</head>
<body>
    <form id="myform">
    <div class="quiz-container" id="quiz">
        <div class="quiz-header">
            <h2 id="question">Which subject/activities do you enjoy the most in school?</h2>
            <ul>
                <li>
                    <input type="radio" name="answer" id="a" class="answer">
                    <label for="a" id="a_text">Science</label>
                </li>

                <li>
                    <input type="radio" name="answer" id="b" class="answer">
                    <label for="b" id="b_text">Social Science</label>
                </li>

                <li>
                    <input type="radio" name="answer" id="c" class="answer">
                    <label for="c" id="c_text">Business and Management </label>
                </li>

                <li>
                    <input type="radio" name="answer" id="d" class="answer">
                    <label for="d" id="d_text">Extracurricular Activities</label>
                </li>
            </ul>
        </div>
        <button id="submit">Submit</button>
    </div>
</form>


    <script>
       
        document.getElementById("myform").addEventListener("submit", function(event) {
            event.preventDefault(); 
            window.open("two.html", "_blank"); 
        });
    </script>

</body>
</html>
